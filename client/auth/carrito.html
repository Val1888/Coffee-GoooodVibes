<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Good Vibes - Menu</title>
    <link rel="stylesheet" href="css/carrito.css">
</head>
<body>
    <header>

        <div class="top-bar">

            <div class="logo-area">
                <div class="logo"></div>
                <h1 class="site-title">Good Vibes Coffe</h1>
            </div>

            <div class="logout">
                Cerrar Sesión
            </div>

        </div>

        <nav>
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="menu.html">Cafés</a></li>
                <li><a href="carrito.html">Carrito</a></li>
                <li><a href="cuenta.html">Cuenta</a></li>
                <li><a href="about.html">Nosotros</a></li>
                <li><a href="locales.html">Locales</a></li>
            </ul>
        </nav>

    </header>

    <main>

        <h2 class="cart-title">
            Carrito
        </h2>

        <section class="cart-table">

            <div class="table-header">

                <div>Producto</div>
                <div>tamaño</div>
                <div>Precio</div>
                <div>Cantidad</div>
                <div>Total</div>

            </div>

            <div class="table-row">

                <div>Café expreso</div>
                <div>Ch</div>
                <div>$23.00</div>
                <div>x1</div>
                <div>$23.00</div>

            </div>

            <div class="table-row">

                <div>Shaky coffe</div>
                <div>G</div>
                <div>$70.00</div>
                <div>x3</div>
                <div>$140.00</div>

            </div>

        </section>

        <section class="cart-bottom">


            <div class="left-side">

                <div class="input-group">

                    <label>
                        Código de Promoción
                    </label>

                    <div class="row-flex">

                        <input
                            type="text"
                            id="promoCode"
                            class="input-box"
                            placeholder="Ingresa código"
                        >

                        <button class="button" onclick="usarCodigo()">
                            Usar Código
                        </button>

                    </div>

                </div>

                <div class="input-group">

                    <label>
                        Puntos
                    </label>

                    <div class="row-flex">

                        <input
                            type="number"
                            id="pointsInput"
                            class="input-box"
                            placeholder="0"
                        >

                        <button class="button" onclick="usarPuntos()">
                            Usar Puntos
                        </button>

                    </div>

                </div>

            </div>


            <div class="summary-box">

                <div class="summary-row">
                    <span>Descuento</span>
                    <span id="discountText">$0.00</span>
                </div>

                <div class="summary-row">
                    <span>Total</span>
                    <span id="totalText">$163.00</span>
                </div>

                <div class="summary-row">
                    <span>Total</span>
                    <span>$163.00</span>
                </div>

            </div>

        </section>

        <section class="final-row">
            <h2 class="slogan">
                Siempre dando lo mejor en todo
            </h2>
            <button class="payment-btn" onclick="window.location.href='pago.html'">
                Metodo de pago
            </button>

        </section>

    </main>
    <script>

        let total = 163;
        let descuento = 0;

        function usarCodigo(){

            const codigo =
            document.getElementById("promoCode").value;

            if(codigo === "KS7TA2"){

                descuento = 20;

                actualizarTotal();

                alert("Código aplicado");

            }else{

                alert("Código inválido");

            }

        }


        function usarPuntos(){

            const puntos =
            parseInt(document.getElementById("pointsInput").value);

            if(isNaN(puntos) || puntos <= 0){

                alert("Ingresa puntos válidos");
                return;

            }

            descuento += puntos / 10;

            actualizarTotal();

            alert("Puntos aplicados");

        }

        function actualizarTotal(){

            let nuevoTotal = total - descuento;

            if(nuevoTotal < 0){

                nuevoTotal = 0;

            }

            document.getElementById("discountText")
            .innerText = "$" + descuento.toFixed(2);

            document.getElementById("totalText")
            .innerText = "$" + nuevoTotal.toFixed(2);

        }

    </script>
</body>
